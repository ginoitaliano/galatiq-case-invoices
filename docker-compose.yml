version: "3.9"

services:

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: galatiq-backend
    restart: unless-stopped
    ports:
      - "8000:8000"          # API docs available at http://localhost:8000/docs
    env_file:
      - backend/.env         # reads your GROK_API_KEY, ANTHROPIC_API_KEY, etc.
    volumes:
      - invoice-data:/app/data   # persist SQLite inventory DB between restarts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── React frontend ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: galatiq-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"          # Dashboard at http://localhost:3000
    depends_on:
      backend:
        condition: service_healthy   # wait until backend passes healthcheck

volumes:
  invoice-data:              # named volume — survives container restarts
